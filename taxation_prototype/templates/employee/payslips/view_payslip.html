{% extends "base.html" %}

{% block page_title %}My Payslip - {{ payslip.payslip_id }}{% endblock %}

{% block content %}
<div class="mb-4 no-print">
    <a href="{{ url_for('employee.history') }}" class="btn btn-secondary me-2">Back to History</a>
    <button onclick="window.print()" class="btn btn-primary"><i class="bi bi-printer"></i> Print</button>
    <a href="{{ url_for('employee.download_payslip', payslip_id=payslip.payslip_id) }}" class="btn btn-outline-primary"><i class="bi bi-download"></i> Download PDF</a>
</div>

{% include 'components/payslip_document.html' %}
{% endblock %}

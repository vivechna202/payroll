{% extends "base.html" %}

{% block title %}Edit Salary – TaxPro HRMS{% endblock %}
{% block page_title %}Edit Salary Components{% endblock %}
{% block page_subtitle %}Employee ID: {{ employee_id }}{% endblock %}

{% block content %}
<div class="card max-w-2xl">
  <form method="POST">
    <div class="space-y-4">
      <div>
        <label class="form-label">Basic Salary</label>
        <input type="number" step="0.01" name="basic_salary" class="form-input" value="{{ salary.get('basic_salary', 0) }}" required />
      </div>
      <div>
        <label class="form-label">HRA</label>
        <input type="number" step="0.01" name="hra" class="form-input" value="{{ salary.get('hra', 0) }}" required />
      </div>
      <div>
        <label class="form-label">Special Allowance</label>
        <input type="number" step="0.01" name="special_allowance" class="form-input" value="{{ salary.get('special_allowance', 0) }}" required />
      </div>
      <div>
        <label class="form-label">Other Allowances</label>
        <input type="number" step="0.01" name="other_allowances" class="form-input" value="{{ salary.get('other_allowances', 0) }}" required />
      </div>
    </div>
    
    <div class="mt-6 flex gap-3">
      <button type="submit" class="btn-primary">Save Changes</button>
      <a href="{{ url_for('hr.payroll_processing') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

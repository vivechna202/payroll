<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 – Access Denied · TaxPro HRMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background-color: var(--bg-surface); color: var(--text-primary);">
  <div class="text-center px-6">
    <p class="text-8xl font-black mb-4" style="color: var(--badge-danger-text);">403</p>
    <h1 class="text-2xl font-bold mb-2" style="color: var(--text-primary);">Access Denied</h1>
    <p class="mb-8" style="color: var(--text-muted);">You don't have permission to access this page.</p>
    <a href="/" class="px-6 py-3 rounded-xl font-semibold text-sm transition-colors"
       style="background-color: var(--badge-info-bg); color: var(--badge-info-text); border: 1px solid var(--badge-info-border);"
       onmouseover="this.style.backgroundColor='var(--badge-info-bg)'; this.style.opacity='0.9'"
       onmouseout="this.style.opacity='1'">
      Back to Dashboard
    </a>
  </div>
</body>
</html>

{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">
  <div class="mb-6">
    <a href="{{ url_for('payroll_engine.dashboard') }}" class="text-slate-400 hover:text-white text-sm mb-2 inline-block">
      &larr; Back to Dashboard
    </a>
    <h2 class="text-2xl font-bold">New Payroll Batch</h2>
    <p class="text-slate-400 mt-1">Create a new batch for processing employee salaries.</p>
  </div>

  <div class="card p-6">
    <form method="POST">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="form-label">Month</label>
          <select name="month" class="form-input" required>
            <option value="1" {% if current_month == 1 %}selected{% endif %}>January</option>
            <option value="2" {% if current_month == 2 %}selected{% endif %}>February</option>
            <option value="3" {% if current_month == 3 %}selected{% endif %}>March</option>
            <option value="4" {% if current_month == 4 %}selected{% endif %}>April</option>
            <option value="5" {% if current_month == 5 %}selected{% endif %}>May</option>
            <option value="6" {% if current_month == 6 %}selected{% endif %}>June</option>
            <option value="7" {% if current_month == 7 %}selected{% endif %}>July</option>
            <option value="8" {% if current_month == 8 %}selected{% endif %}>August</option>
            <option value="9" {% if current_month == 9 %}selected{% endif %}>September</option>
            <option value="10" {% if current_month == 10 %}selected{% endif %}>October</option>
            <option value="11" {% if current_month == 11 %}selected{% endif %}>November</option>
            <option value="12" {% if current_month == 12 %}selected{% endif %}>December</option>
          </select>
        </div>
        <div>
          <label class="form-label">Year</label>
          <input type="number" name="year" class="form-input" value="{{ current_year }}" required />
        </div>
      </div>
      
      <div class="mb-4">
        <label class="form-label">Financial Year</label>
        <input type="text" name="fy" class="form-input" value="{{ fy }}" required />
      </div>

      <div class="mb-6">
        <label class="form-label">Description (Optional)</label>
        <input type="text" name="description" class="form-input" placeholder="e.g. Regular Monthly Salary" />
      </div>

      <div class="flex justify-end gap-3">
        <a href="{{ url_for('payroll_engine.dashboard') }}" class="btn-secondary">Cancel</a>
        <button type="submit" class="btn-primary">Create Batch</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
